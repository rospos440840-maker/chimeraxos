d-i debian-installer/locale string ru_RU.UTF-8
d-i keyboard-configuration/xkb-keymap select us,ru
d-i keyboard-configuration/toggle select No toggling

d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string chimerax
d-i netcfg/get_domain string local

d-i mirror/country string manual
d-i mirror/http/hostname string archive.ubuntu.com
d-i mirror/http/directory string /ubuntu

d-i passwd/root-login boolean true
d-i passwd/root-password password chimerax
d-i passwd/root-password-again password chimerax
d-i passwd/user-fullname string ChimeraX User
d-i passwd/username string chimerax
d-i passwd/user-password password chimerax
d-i passwd/user-password-again password chimerax

d-i clock-setup/utc boolean true
d-i time/zone string Europe/Moscow

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i base-installer/kernel/image string linux-generic

d-i apt-setup/restricted boolean true
d-i apt-setup/universe boolean true
d-i apt-setup/multiverse boolean true

tasksel tasksel/first multiselect kubuntu-desktop

d-i pkgsel/include string ark p7zip-full p7zip-rar rar unrar acetoneiso dmg2img xar steam lutris code arduino flatpak curl

d-i grub-installer/only_debian boolean false
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda

d-i finish-install/reboot_in_progress note

d-i preseed/late_command string \
    cp /cdrom/scripts/post-install.sh /target/root/ ; \
    chmod +x /target/root/post-install.sh ; \
    in-target /root/post-install.sh
